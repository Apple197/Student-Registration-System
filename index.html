<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A simple student registration system that helps users add, update, and remove student information such as name, student ID, email, and contact number in an organized way.">
    <meta name="keywords"
        content="student registration system, student management, student records, student information system, register students, manage students">
    <meta name="author" content="Nazrul Hasan">
    <meta name="robots" content="index, follow">
    <script src="./assets/script.js" defer></script>
    <link rel="stylesheet" href="./assets/style.css" />
    <title>Student Registration System | Manage Student Records Easily</title>
</head>

<body>
    <!-- Here is the header -->
    <header>
        <h1>Student Registration System</h1>
        <p>This system helps manage student information in a simple and organized way. Users can add new students,
            update their details, or remove records when needed.</p>
    </header>

    <!-- Here is the form section -->
    <section id="srs-form">
        <form method="post">
            <input type="text" name="studentName" placeholder="Student Name" required />
            <input type="number" name="studentID" placeholder="Student ID" required />
            <input type="email" name="studentEmail" placeholder="Student Email" required />
            <input type="tel" name="studentPhone" placeholder="Student Contact Number" pattern="[0-9]{10,15}"
                title="Contact number must contain at least 10 digits" required />
            <button type="submit">Add Student</button>
        </form>
    </section>

    <!-- Here is the detail section -->
    <section id="srs-detail">
        <table>
            <caption>Student Details​</caption>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Student ID</th>
                    <th>Email</th>
                    <th>Contact Number</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Student details will be populated here -->
            </tbody>
        </table>
    </section>

    <!-- Here is the edit form section -->
    <section id="srs-edit-form">
        <div class="srs-edit-wrapper">
            <form method="post">
                <div>
                    <div>
                        <label for="studentName">Student Name</label>
                        <input type="text" name="studentName" required />
                    </div>
                    <div>
                        <label for="studentID">Student ID</label>
                        <input type="number" name="studentID" required />
                    </div>
                </div>
                <div>
                    <div>
                        <label for="studentEmail">Student Email</label>
                        <input type="email" name="studentEmail" required />
                    </div>
                    <div>
                        <label for="studentPhone">Student Contact Number</label>
                        <input type="tel" name="studentPhone" pattern="[0-9]{10,15}"
                            title="Contact number must contain at least 10 digits" required />
                    </div>
                </div>
                <button type="submit">Save</button>
            </form>
            <img src="./assets/icon/close.svg" alt="close icon" />
        </div>
        <div class="edit-form-overlay"></div>
    </section>

    <section id="srs-toast-message"></section>

</body>

</html>

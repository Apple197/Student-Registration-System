<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A simple student registration system that helps users add, update, and remove student information such as name, student ID, email, and contact number in an organized way.">
    <meta name="keywords"
        content="student registration system, student management, student records, student information system, register students, manage students">
    <meta name="author" content="Nazrul Hasan">
    <meta name="robots" content="index, follow">
    <script src="./assets/script.js" defer></script>
    <link rel="stylesheet" href="./assets/style.css" />
    <title>Student Registration System | Manage Student Records Easily</title>
</head>

<body>
    <!-- Here is the header -->
    <header>
        <h1>Student Registration System</h1>
        <p>This system helps manage student information in a simple and organized way. Users can add new students,
            update their details, or remove records when needed.</p>
    </header>

    <!-- Here is the form section -->
    <section id="srs-form">
        <form method="post">
            <input type="text" name="studentName" placeholder="Enter student name" required />
            <input type="number" name="studentID" placeholder="Enter student ID" required />
            <input type="email" name="studentEmail" placeholder="Enter student email" required />
            <input type="tel" name="studentPhone" placeholder="Enter student phone number" required />
            <button type="submit">Add Student</button>
        </form>
    </section>

    <!-- Here is the detail section -->
    <section id="srs-detail">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Student details will be populated here -->
            </tbody>
        </table>
    </section>

</body>

</html>
